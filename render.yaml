services:
  - type: web
    name: ncpm-erp-api
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_PATH
        value: /var/data/erp_phase1.sqlite3
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
